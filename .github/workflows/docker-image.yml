name: Kubernetes CI
on:
  push:
    branches:
      - main
      - develop
      - feature/login-try
    tags:
      - 'v*'  
  workflow_dispatch:
jobs:
  pyapp-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4
      # - name: Set short SHA
      #   run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
      - name: Set Image Tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "IMAGE_TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV
          fi
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: "${{ secrets.DOCKER_USERNAME }}"
          password: "${{ secrets.DOCKER_PASSWORD }}"
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: krishnh/gha-pyapp:${{ env.IMAGE_TAG }}
      - name: Install yq
        uses: mikefarah/yq@v4.44.3
      - name: Update deployment.yml with latest docker tag
        run: |
          # Short commit hash
          SHORT_SHA=${GITHUB_SHA::7}
          # Update image tag in deployment.yaml
          yq -i '.spec.template.spec.containers[0].image = "krishnh/gha-pyapp:'"${IMAGE_TAG}"'"' ./k8s/pyapp-deployment.yml
      - name: Update deployment file with image tag
        run: |
          echo "Updating k8s/pyapp-deployment.yml with IMAGE_TAG=${IMAGE_TAG}"
          yq -i '.spec.template.spec.containers[0].image = "krishnh/gha-pyapp:'"${IMAGE_TAG}"'"' ./k8s/pyapp-deployment.yml

      - name: Commit deployment file changes
        if: startsWith(github.ref, 'refs/heads/')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@noreply"
          git add k8s/pyapp-deployment.yml
          git commit -m "docker tag updated by GHA" || echo "No changes to commit"
          git push origin main

